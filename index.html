<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Weather App</title>
    <link rel="stylesheet" href="Style.css" />
    <script defer src="script.js"></script>
  </head>

  <body>
    <div id="ui">
      <h1>Weather App</h1>

      <input type="text" id="location" value="Enter location" />
      <button id="btn">Check Weather</button>

      <div class="box">
        <p id="weatherText">Weather info will appear here.</p>
      </div>

      <div class="box">
        <p id="outfitText">Outfit recommendation will appear here.</p>
      </div>
    </div>

    <!-- Visual things -->
    <div id="sun"></div>
    <div id="cloud"></div>
    <div id="rain"></div>
  </body>

</html>
